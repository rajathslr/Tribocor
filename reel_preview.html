<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribocor TC 40 Reel Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #004d40;
            --accent: #c6ff00;
            --bg: #0a0a0a;
            --text: #ffffff;
            --gray: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .phone-container {
            width: 360px;
            height: 640px;
            background: #000;
            border-radius: 40px;
            border: 8px solid var(--gray);
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px rgba(0, 77, 64, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .scene.active {
            display: flex;
            background-size: cover;
            background-position: center;
        }

        /* Shot 1: Rusty Chain */
        #shot1 {
            background: radial-gradient(circle, #222 0%, #000 100%);
            animation: cameraShake 0.1s infinite;
        }

        #shot1::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.2;
        }

        .dust {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(80, 50, 20, 0.3);
            mix-blend-mode: color-burn;
        }

        /* Shot 2: Spray */
        #shot2 {
            background: #111;
        }

        .spray-effect {
            position: absolute;
            width: 4px;
            height: 100px;
            background: linear-gradient(to top, var(--accent), transparent);
            filter: blur(2px);
            opacity: 0;
        }

        /* Shot 3: Smooth Chain */
        #shot3 {
            background: radial-gradient(circle, #001a14 0%, #000 100%);
        }

        .spinning-cog {
            width: 200px;
            height: 200px;
            border: 15px dashed #444;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinning-cog::after {
            content: '';
            width: 140px;
            height: 140px;
            border: 5px solid #666;
            border-radius: 50%;
        }

        /* End Card */
        #endcard {
            background: linear-gradient(135deg, var(--primary) 0%, #000 100%);
        }

        .product-shot {
            width: 180px;
            height: 320px;
            background: linear-gradient(to bottom, #00332c, #001a14);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .product-shot span {
            font-size: 32px;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(198, 255, 0, 0.5);
        }

        .text-overlay {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
            text-transform: uppercase;
            z-index: 10;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .scene.active .text-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .logo-small {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-weight: 700;
            font-size: 14px;
            opacity: 0.8;
        }

        .tagline {
            font-size: 16px;
            letter-spacing: 4px;
            color: var(--accent);
            margin-top: 10px;
            text-transform: uppercase;
        }

        .cta-btn {
            background: var(--accent);
            color: #000;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: 700;
            margin-top: 20px;
            text-decoration: none;
            font-size: 14px;
            box-shadow: 0 0 20px rgba(198, 255, 0, 0.4);
        }

        @keyframes cameraShake {
            0% { transform: translate(0,0); }
            50% { transform: translate(1px, 1.5px); }
            100% { transform: translate(-1px, -1px); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        button:hover {
            background: var(--accent);
            color: #000;
        }

        .info {
            max-width: 400px;
            text-align: center;
            margin-bottom: 20px;
            color: #aaa;
            font-size: 14px;
        }

        .progress-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            display: flex;
            gap: 4px;
            z-index: 100;
        }

        .progress-step {
            flex: 1;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
        }

        .active-step .progress-fill {
            width: 100%;
            transition: width 3s linear;
        }
    </style>
</head>
<body>

    <div class="info">
        <h1>Tribocor TC 40 Reel Concept</h1>
        <p>A dramatic visual experience for Instagram Reels.</p>
    </div>

    <div class="phone-container" id="phone">
        <div class="progress-bar">
            <div class="progress-step"><div class="progress-fill"></div></div>
            <div class="progress-step"><div class="progress-fill"></div></div>
            <div class="progress-step"><div class="progress-fill"></div></div>
            <div class="progress-step"><div class="progress-fill"></div></div>
        </div>

        <!-- Shot 1 -->
        <div class="scene" id="shot1">
            <div class="dust"></div>
            <div class="text-overlay">Is your chain slowly killing your bike?</div>
        </div>

        <!-- Shot 2 -->
        <div class="scene" id="shot2">
            <div class="text-overlay">Green spray coats the chain in slow motion...</div>
            <div id="sprays"></div>
        </div>

        <!-- Shot 3 -->
        <div class="scene" id="shot3">
            <div class="spinning-cog"></div>
            <div class="text-overlay" style="margin-top: 30px;">Lasts up to 500 km per application</div>
        </div>

        <!-- End Card -->
        <div class="scene" id="endcard">
            <div class="product-shot">
                <span>TC 40</span>
            </div>
            <div class="text-overlay">TC 40 Chain Lube</div>
            <div class="tagline">Engineered to Perform</div>
            <div class="cta-btn">BUY NOW</div>
            <div class="logo-small">TRIBOCOR</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="startReel()">PLAY REEL</button>
        <button onclick="resetReel()">RESET</button>
    </div>

    <script>
        const scenes = document.querySelectorAll('.scene');
        const progressFills = document.querySelectorAll('.progress-fill');
        const progressSteps = document.querySelectorAll('.progress-step');
        let currentScene = 0;
        let timer;

        function showScene(index) {
            scenes.forEach(s => s.classList.remove('active'));
            progressSteps.forEach(s => s.classList.remove('active-step'));
            
            if (index < scenes.length) {
                scenes[index].classList.add('active');
                progressSteps[index].classList.add('active-step');
                
                if (index === 1) createSpray();
                
                timer = setTimeout(() => {
                    showScene(index + 1);
                }, 3000);
            }
        }

        function createSpray() {
            const container = document.getElementById('sprays');
            container.innerHTML = '';
            for(let i=0; i<20; i++) {
                const s = document.createElement('div');
                s.className = 'spray-effect';
                s.style.left = Math.random()*100 + '%';
                s.style.top = Math.random()*100 + '%';
                s.style.transform = `rotate(${Math.random()*360}deg)`;
                s.style.animation = `sprayAnim 0.5s ease forward ${Math.random()}s`;
                container.appendChild(s);
            }
        }

        function startReel() {
            resetReel();
            showScene(0);
        }

        function resetReel() {
            clearTimeout(timer);
            scenes.forEach(s => s.classList.remove('active'));
            progressSteps.forEach(s => s.classList.remove('active-step'));
            currentScene = 0;
        }

        // Add spray animation dynamically
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes sprayAnim {
                0% { opacity: 0; transform: scale(0) translateY(0); }
                50% { opacity: 0.8; transform: scale(1.5) translateY(-20px); }
                100% { opacity: 0; transform: scale(2) translateY(-40px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
