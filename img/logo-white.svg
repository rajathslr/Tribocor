<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#1a1a1a" /> <!-- Dark background matching the image -->
  
  <style>
    .title { 
      font-family: 'Arial Black', Impact, sans-serif; 
      font-size: 155px; 
      font-weight: 900; 
      fill: #1a1a1a; /* Dark transparent cut-out look */
      stroke: #ffffff; 
      stroke-width: 5px; 
      stroke-linejoin: miter; 
      letter-spacing: -3px; 
    }
    .reg { font-size: 35px; fill: #ffffff; stroke: #ffffff; stroke-width: 1px; font-family: Arial, sans-serif;}
    .green-bar { fill: #4a8f3c; } /* Matching the specific green in the image */
    .white-bar { fill: #b9b9b9; } /* Subtle gray rather than pure white */
    .subtitle { 
      font-family: 'Arial', Helvetica, sans-serif; 
      font-size: 52px; 
      font-style: italic; 
      font-weight: 900; 
      fill: #ffffff; 
      letter-spacing: 0px; 
    }
    .star { fill: #888888; font-size: 35px;}
  </style>
  
  <!-- Main Title -->
  <text x="20" y="145" class="title" textLength="710" lengthAdjust="spacingAndGlyphs">TriboCor</text>
  
  <!-- Registered Symbol -->
  <text x="760" y="55" class="reg">®</text>
  
  <!-- Underline Bars -->
  <!-- Green Bar (Tribo) -->
  <polygon points="12,165 465,165 450,195 12,195" class="green-bar" />
  
  <!-- White/Gray Bar (Cor) -->
  <polygon points="480,165 745,165 730,195 465,195" class="white-bar" />
  
  <!-- Subtitle -->
  <text x="25" y="235" class="subtitle">High Performance Aerosol</text>
  <text x="750" y="230" class="star">✦</text>
</svg>
